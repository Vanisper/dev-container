services:
  go-dev:
    extends:
      file: ../common.yml
      service: base-dev
    build:
      context: ..
      dockerfile: Dockerfile.base
      args:
        - BASE_IMAGE=golang:latest
        - UID=${DEV_UID:-1000}
        - GID=${DEV_GID:-1000}
        - APT_MIRROR=${APT_MIRROR:-}
    image: dev-go:latest
    container_name: ${COMPOSE_PROJECT_NAME:-dev}-go
    volumes:
      - ../../volumes/go-pkg:/go/pkg
    environment:
      - GOPATH=/go
      - GOCACHE=/go/cache
    command: bash

networks:
  dev-network:
    driver: bridge
