services:
  node-dev:
    extends:
      file: ../common.yml
      service: base-dev
    build:
      context: ..
      dockerfile: Dockerfile.base
      args:
        - BASE_IMAGE=node:lts
        - UID=${DEV_UID:-1000}
        - GID=${DEV_GID:-1000}
    image: dev-node:latest
    container_name: ${COMPOSE_PROJECT_NAME:-dev}-node
    volumes:
      - ../../volumes/node-cache:/home/dev/.npm
    environment:
      - NPM_CONFIG_CACHE=/home/dev/.npm
    command: bash

networks:
  dev-network:
    driver: bridge
